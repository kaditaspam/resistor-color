<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resistor Lab Pro | Number Theory Ent.</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #334155;
            --box-bg: #e2e8f0;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 800px;
            width: 100%;
        }

        /* Resistor Body */
        .resistor-display {
            background: #d4a373;
            height: 70px;
            width: 300px;
            margin: 30px auto;
            border-radius: 35px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .band { width: 18px; height: 100%; transition: 0.3s; }

        /* The Result Boxes from your Image */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 25px 0;
        }

        .result-item { text-align: center; }
        .result-label { font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; }
        .result-value {
            background: var(--box-bg);
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
        }

        select, button {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
        }

        button {
            grid-column: span 2;
            background: var(--accent);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <h2 style="text-align: center; margin-top: 0;">Resistor Color Code Calculator</h2>
    
    <div class="resistor-display">
        <div id="v-b1" class="band"></div>
        <div id="v-b2" class="band"></div>
        <div id="v-b3" class="band"></div>
        <div id="v-multi" class="band"></div>
        <div id="v-tol" class="band"></div>
    </div>

    <div class="results-grid">
        <div class="result-item">
            <div class="result-label">Resistance</div>
            <div class="result-value" id="res-val">---</div>
        </div>
        <div class="result-item">
            <div class="result-label">Minimum</div>
            <div class="result-value" id="min-val">---</div>
        </div>
        <div class="result-item">
            <div class="result-label">Maximum</div>
            <div class="result-value" id="max-val">---</div>
        </div>
    </div>

    <div class="controls">
        <select id="b1" onchange="calc()">
            <option value="2" selected>Red (2)</option>
            <option value="1">Brown (1)</option>
            </select>
        <select id="b2" onchange="calc()">
            <option value="1" selected>Brown (1)</option>
            <option value="0">Black (0)</option>
        </select>
        <select id="b3" onchange="calc()">
            <option value="0" selected>Black (0)</option>
        </select>
        <select id="multi" onchange="calc()">
            <option value="1000" selected>Orange (x1k)</option>
            <option value="100">Red (x100)</option>
        </select>
        <select id="tol" onchange="calc()" style="grid-column: span 2;">
            <option value="0.25" selected>Blue (±0.25%)</option>
            <option value="0.5">Green (±0.5%)</option>
            <option value="1">Brown (±1%)</option>
            <option value="5">Gold (±5%)</option>
        </select>
        
        <button onclick="saveImage()">Save Screenshot</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const colorMap = {
        "0": "black", "1": "brown", "2": "red", "3": "orange", "4": "yellow",
        "5": "green", "6": "blue", "7": "violet", "8": "grey", "9": "white"
    };

    function calc() {
        const v1 = document.getElementById('b1').value;
        const v2 = document.getElementById('b2').value;
        const v3 = document.getElementById('b3').value;
        const m = parseFloat(document.getElementById('multi').value);
        const t = parseFloat(document.getElementById('tol').value);

        const ohms = parseInt(v1 + v2 + v3) * m;
        const toleranceAmount = ohms * (t / 100);

        const min = ohms - toleranceAmount;
        const max = ohms + toleranceAmount;

        // Display Formatting
        document.getElementById('res-val').innerText = format(ohms) + " ±" + t + "%";
        document.getElementById('min-val').innerText = format(min);
        document.getElementById('max-val').innerText = format(max);

        // Update Visuals
        document.getElementById('v-b1').style.background = colorMap[v1];
        document.getElementById('v-b2').style.background = colorMap[v2];
        document.getElementById('v-b3').style.background = colorMap[v3];
        document.getElementById('v-multi').style.background = m === 1000 ? "orange" : "red";
        document.getElementById('v-tol').style.background = t === 0.25 ? "blue" : "gold";
    }

    function format(num) {
        if (num >= 1000000) return (num/1000000).toFixed(3) + " MΩ";
        if (num >= 1000) return (num/1000).toFixed(3) + " kΩ";
        return num.toFixed(2) + " Ω";
    }

    function saveImage() {
        html2canvas(document.querySelector("#capture-area")).then(canvas => {
            const link = document.createElement('a');
            link.download = 'resistor-calculation.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    calc();
</script>

</body>
</html>
